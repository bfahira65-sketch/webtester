<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TOKOBET Mobile - Part 1A</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

<header class="header">
    <img class="logo"
    src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEh70uu_a46O5xDU597Xk2AQtUy-blJmbLMJ7AVex_wawPhil47vEqO1EcuJVRCG4Xb_Wwj_prGNhPeNrzyTzoEZWGh_XEhCVks_BRtew3qTfipJtZf3SIMGJwcQVE1NXLb2JFcg7ebshzNoNA4y-qJyYKC6uld2sck6Fd0NqkMpy4Du5oFC3xCX0s3_kAXJ/s1536/ChatGPT%20Image%20Jul%201,%202026,%2005_14_57%20PM.png"
    alt="TOKOBET">
</header>

<section id="loginPage" class="page active">
    <div class="card">
        <h2>Masuk ke Akun</h2>

        <form id="loginForm">
            <input id="nama" type="text" placeholder="Nama Pengguna" required>
            <input id="password" type="password" placeholder="Kata Sandi" required>
            <button type="submit">LOGIN AKUN</button>
        </form>

        <p class="small">
            Dengan masuk, Anda akan diarahkan ke dashboard tanpa berpindah file HTML.
        </p>
    </div>
</section>

<section id="dashboardPage" class="page" style="display:none">
    <div class="card">
        <h2>Selamat Datang</h2>
        <p>Username : <strong id="namaUser"></strong></p>

        <button id="btnDeposit">Lanjut ke Deposit</button>
    </div>
</section>

<script src="script.js"></script>
</div>
</body>
</html>
