<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Daftar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .page { display: none; }
        .page.active { display: block; }
        .success { color: green; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <div class="max-w-md mx-auto mt-10 bg-white rounded-3xl shadow-xl overflow-hidden">

        <!-- Navbar Mini -->
        <div class="bg-blue-600 text-white p-4 text-center font-bold text-xl">
            Demo Login & Daftar
        </div>

        <!-- HOME / LANDING -->
        <div id="home" class="page active p-8 text-center">
            <h1 class="text-3xl font-bold mb-6">Selamat Datang</h1>
            <button onclick="showPage('register')" 
                    class="w-full bg-blue-600 text-white py-4 rounded-2xl text-lg mb-3">
                Daftar Akun Baru
            </button>
            <button onclick="showPage('login')" 
                    class="w-full border border-blue-600 text-blue-600 py-4 rounded-2xl text-lg">
                Sudah Punya Akun? Masuk
            </button>
        </div>

        <!-- REGISTER -->
        <div id="register" class="page p-8">
            <h2 class="text-2xl font-bold mb-6 text-center">Daftar Akun</h2>
            <form onsubmit="registerUser(event)">
                <input type="text" id="regName" placeholder="Nama Lengkap" required class="w-full p-4 border rounded-2xl mb-4">
                <input type="email" id="regEmail" placeholder="Email" required class="w-full p-4 border rounded-2xl mb-4">
                <input type="password" id="regPass" placeholder="Password (minimal 6 karakter)" required minlength="6" class="w-full p-4 border rounded-2xl mb-6">
                <button type="submit" class="w-full bg-green-600 text-white py-4 rounded-2xl text-lg">Daftar</button>
            </form>
            <p class="text-center mt-6">Sudah punya akun? 
                <span onclick="showPage('login')" class="text-blue-600 cursor-pointer">Masuk</span>
            </p>
        </div>

        <!-- LOGIN -->
        <div id="login" class="page p-8">
            <h2 class="text-2xl font-bold mb-6 text-center">Masuk</h2>
            <form onsubmit="loginUser(event)">
                <input type="email" id="loginEmail" placeholder="Email" required class="w-full p-4 border rounded-2xl mb-4">
                <input type="password" id="loginPass" placeholder="Password" required class="w-full p-4 border rounded-2xl mb-6">
                <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-2xl text-lg">MASUK</button>
            </form>
            <p class="text-center mt-6">Belum punya akun? 
                <span onclick="showPage('register')" class="text-blue-600 cursor-pointer">Daftar</span>
            </p>
        </div>

        <!-- DASHBOARD -->
        <div id="dashboard" class="page p-8 text-center">
            <h2 class="text-3xl font-bold mb-2">Halo, <span id="userGreeting" class="text-blue-600"></span>!</h2>
            <p id="userEmail" class="text-gray-600 mb-8"></p>
            
            <div class="bg-green-100 text-green-700 p-6 rounded-2xl mb-8">
                ✅ Login Berhasil
            </div>
            
            <button onclick="logout()" 
                    class="w-full bg-red-500 text-white py-4 rounded-2xl text-lg">
                KELUAR
            </button>
        </div>

    </div>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            document.getElementById(pageId).classList.add('active');
        }

        function registerUser(e) {
            e.preventDefault();
            
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPass').value;

            if (password.length < 6) {
                alert("Password minimal 6 karakter!");
                return;
            }

            let users = JSON.parse(localStorage.getItem('demoUsers') || '[]');

            // Cek apakah email sudah ada
            if (users.some(user => user.email === email)) {
                alert("Email ini sudah terdaftar!");
                return;
            }

            users.push({ name, email, password });
            localStorage.setItem('demoUsers', JSON.stringify(users));

            alert("✅ Pendaftaran BERHASIL!\n\nSilakan login sekarang.");
            showPage('login');
            
            // Reset form
            e.target.reset();
        }

        function loginUser(e) {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPass').value;

            const users = JSON.parse(localStorage.getItem('demoUsers') || '[]');
            const user = users.find(u => u.email === email && u.password === password);

            if (user) {
                document.getElementById('userGreeting').textContent = user.name;
                document.getElementById('userEmail').textContent = user.email;
                showPage('dashboard');
            } else {
                alert("❌ Email atau password salah!");
            }
        }

        function logout() {
            if (confirm("Yakin ingin keluar?")) {
                showPage('home');
            }
        }
    </script>
</body>
</html>
