<!DOCTYPE html>
<html>
<head>

<title>Game Center</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
box-sizing:border-box;
}


body{

margin:0;
background:#080808;
font-family:Arial,sans-serif;
color:white;

}



.container{

max-width:1200px;
margin:auto;
padding:20px;

}



/* LOGO */

.logo-area{

text-align:center;
margin-bottom:25px;

}


.logo{

width:380px;
max-width:95%;
height:auto;

}



/* GAME GRID */

.game-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));

gap:20px;

}



/* CARD */

.game-card{

background:#151515;

border-radius:18px;

overflow:hidden;

border:1px solid #333;

transition:.3s;

}


.game-card:hover{

transform:translateY(-5px);

}





.game-image{

width:100%;

height:220px;

object-fit:cover;

}





.game-content{

padding:15px;

text-align:center;

}



.game-title{

font-size:18px;

font-weight:bold;

min-height:50px;

}





.buttons{

display:flex;

gap:8px;

margin-top:15px;

}




.btn{

flex:1;

padding:11px;

border-radius:10px;

text-decoration:none;

font-weight:bold;

font-size:13px;

}



.demo{

background:#333;

color:white;

}



.main{

background:linear-gradient(45deg,#ffd700,#ff9900);

color:#000;

}



.btn:hover{

opacity:.8;

}






/* VERSI HP */

@media(max-width:600px){


.container{

padding:12px;

}



.logo{

width:280px;

}



.game-grid{

grid-template-columns:repeat(2,1fr);

gap:12px;

}



.game-card{

border-radius:14px;

}



.game-image{

height:140px;

}



.game-content{

padding:10px;

}



.game-title{

font-size:13px;

min-height:42px;

}



.buttons{

gap:5px;

margin-top:10px;

}



.btn{

padding:8px 4px;

font-size:11px;

}



}





</style>


</head>
