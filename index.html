<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAFTAR TOKOBET</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:420px;
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
}

.container h2{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

.input-group{
    margin-bottom:15px;
}

.input-group label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
    color:#444;
}

.input-group input,
.input-group textarea,
.input-group select{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

textarea{
    resize:none;
    height:80px;
}

.button-group{
    display:flex;
    gap:10px;
}

button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    color:white;
    transition:.3s;
}

.reset{
    background:#3d3d3d;
}

.reset:hover{
    background:#3d3d3d;
}
</style>

</head>
<body>

<div class="container">

<h2>DAFTAR AKUN VIP</h2>

<form>

<div class="input-group">
<label>Nama pengguna</label>
<input type="text" placeholder="Masukkan nama Anda">
</div>

<div class="input-group">
<label>Kata sandi</label>
<input type="tel" placeholder="xxxx">
</div>

<div class="input-group">
<label>Konfirmasi sandi</label>
<input type="tel" placeholder="xxxx">
</div>

<div class="input-group">
<label>Alamat email</label>
<input type="email" placeholder="contoh@email.com">
</div>

<div class="input-group">
<label>Pilih slot server</label>
<select>
<option>Pilih</option>
<option>Slot Thailand</option>
<option>Slot Indonesia</option>
</select>
</div>

<div class="input-group">
<label>WA/Nomor Telpon</label>
<input type="email" placeholder="xxxx">
</div>
<div class="input-group">
<label>Nama Sesuai Rekening</label>
<input type="text" placeholder="Nama sesuai rekening">
</div>

<div class="input-group">
<label>Jenis Akun Transaksi</label>

<div style="display:flex;gap:20px;margin-top:8px;">
<label style="font-weight:normal;">
<input type="radio" name="jenis" value="BANK" checked onclick="ubahMetode()">
 BANK
</label>

<label style="font-weight:normal;">
<input type="radio" name="jenis" value="EWALLET" onclick="ubahMetode()">
 E-Wallet
</label>
</div>

</div>

<div class="input-group">
<label id="labelMetode">Pilih Bank</label>

<select id="metode" onchange="ubahLabel()">

<option value="">Pilih Bank</option>

<option>BCA</option>
<option>BRI</option>
<option>MANDIRI</option>
<option>BNI</option>
<option>BANK JAGO</option>
<option>SEABANK</option>

</select>

</div>

<div class="input-group">

<label id="labelNomor">Nomor Rekening</label>

<input type="text" id="nomorAkun" placeholder="Masukkan nomor rekening">

</div>
<div class="button-group">
    <button type="button" class="reset" onclick="window.location.href='https://contohwebsiteanda.com';">
        DAFTAR
    </button>
</div>


</form>

</div>
<script>

const bank = [
"BCA",
"BRI",
"MANDIRI",
"BNI",
"BANK JAGO",
"SEABANK"
];

const ewallet = [
"DANA",
"GOPAY",
"LINKAJA",
"OVO",
"ShopeePay"
];

function ubahMetode(){

let jenis=document.querySelector('input[name="jenis"]:checked').value;

let select=document.getElementById("metode");

select.innerHTML="";

if(jenis=="BANK"){

document.getElementById("labelMetode").innerHTML="Pilih Bank";

document.getElementById("labelNomor").innerHTML="Nomor Rekening";

document.getElementById("nomorAkun").placeholder="Masukkan nomor rekening";

bank.forEach(function(item){

let op=document.createElement("option");

op.text=item;

op.value=item;

select.appendChild(op);

});

}else{

document.getElementById("labelMetode").innerHTML="Pilih E-Wallet";

document.getElementById("labelNomor").innerHTML="Nomor E-Wallet";

document.getElementById("nomorAkun").placeholder="Masukkan nomor e-wallet";

ewallet.forEach(function(item){

let op=document.createElement("option");

op.text=item;

op.value=item;

select.appendChild(op);

});

}

}

ubahMetode();

</script>
</body>
</html>
